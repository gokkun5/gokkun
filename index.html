<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>NeonToys</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="showFigures()">

<h1><img src="neon.jpg" alt=""></h1>

<input 
type="text" 
id="search" 
placeholder="名前で検索..."
oninput="showFigures()"
>

<!-- シリーズ -->
<select id="series" onchange="showFigures()">

<option value="all">All Series</option>
<option value="miku">初音ミク</option>
<option value="naruto">NARUTO</option>
<option value="kimetu">鬼滅の刃</option>
<option value="wanpi">ワンピース</option>
<option value="db">ドラゴンボール</option>
<option value="furi-ren">葬送のフリーレン</option>
<option value="hiro">僕のヒーローアカデミア</option>
<option value="zyuzyutu">呪術廻旋</option>
<option value="orerebe">俺だけレベルアップな件</option>


</select>

<!-- タイプ -->
<select id="type" onchange="showFigures()">

<option value="all">All Types</option>
<option value="MAXIMATIC">MAXIMATIC</option>
<option value="AMP">AMP</option>
<option value="Grandista">Grandista</option>
<option value="Coreful">Coreful</option>
<option value="esp">ESPREST</option>
<option value="trio">Trio-Try-iT</option>
<option value="gli">GLITTER&GLAMOURS</option>
<option value="fig">FIGURIZMα</option>

</select>

<!-- 価格 -->
<select id="price" onchange="showFigures()">

<option value="all">All Prices</option>
<option value="800">800円</option>
<option value="1000">1000円</option>
<option value="1200">1200円</option>
<option value="1300">1300円</option>
<option value="1500">1500円</option>
<option value="1600">1600円</option>
<option value="2000">2000円</option>

<option value="2500">2500円</option>



</select>

<div id="figureList"></div>

<script src="script.js"></script>



</body>
</html>
